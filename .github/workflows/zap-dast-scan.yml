name: "OWASP ZAP Security Scan"

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TARGET_URL: "https://preview.owasp-juice.shop/"

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:

      # Step 1 - Download project
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 - Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Step 3 - Set permissions for ZAP workspace
      - name: Set permissions for ZAP workspace
        run: chmod -R 777 ${{ github.workspace }}

      # Step 4 - Run ZAP Baseline Scan
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ env.TARGET_URL }}
          artifact_name: 'zap-baseline-scan'

      # Step 5 - Run ZAP Full Scan
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ env.TARGET_URL }}
          artifact_name: 'zap-full-scan'

      # Step 6 - Check generated reports
      - name: Check Reports
        run: |
          echo "Generated files:"
          find . -name "*.json"
          find . -name "*.html"
          find . -name "*.md"

      # Step 7 - Run Quality Gate
      - name: Run Quality Gate
        run: |
          node scripts/quality-gate.js report_json.json

      # Step 8 - Upload Reports
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            report_json.json
            report_html.html
            report_md.md